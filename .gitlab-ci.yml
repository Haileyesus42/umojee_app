# umojaairways/backend CI/CD — builds the API + AI-concierge images and deploys
# to the .166 host stack. Ported from the legacy booking / booking-ai pipelines.
#   services/api -> umoja-server     services/ai-concierge -> umoja-booking-ai
stages: [cleanup, build, scan, deploy]

variables:
  IMAGE_TAG: "${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}"
  DEPLOY_COMPOSE: /home/teddy/umoja-deploy/docker-compose.yml

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^ci\//'
    - when: never

cleanup:
  stage: cleanup
  tags: [umoja]
  script:
    - /home/teddy/cleanup-old-images.sh --keep 1 --aggressive || true
  when: always
  allow_failure: true

build-server:
  stage: build
  tags: [umoja]
  needs: [cleanup]
  script:
    - docker build -t "umoja-server:$IMAGE_TAG" ./services/api
    - if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then docker tag "umoja-server:$IMAGE_TAG" umoja-server:latest; fi

build-booking-ai:
  stage: build
  tags: [umoja]
  needs: [cleanup]
  script:
    - docker build -t "umoja-booking-ai:$IMAGE_TAG" ./services/ai-concierge
    - if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then docker tag "umoja-booking-ai:$IMAGE_TAG" umoja-booking-ai:latest; fi

scan:
  stage: scan
  tags: [umoja]
  needs: [build-server, build-booking-ai]
  allow_failure: true
  script:
    - trivy image --cache-dir /tmp/trivy-be --exit-code 0 --severity HIGH,CRITICAL --no-progress "umoja-server:$IMAGE_TAG"
    - trivy image --cache-dir /tmp/trivy-be --exit-code 0 --severity HIGH,CRITICAL --no-progress "umoja-booking-ai:$IMAGE_TAG"

deploy:
  stage: deploy
  tags: [umoja]
  needs: [scan]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - docker compose -f "$DEPLOY_COMPOSE" up -d --force-recreate server booking-ai
    - sleep 5
    - docker compose -f "$DEPLOY_COMPOSE" ps
