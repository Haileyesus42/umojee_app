# umojaairways/frontend — starter pipeline
# Will evolve as SonarQube + Trivy + Lighthouse CI come online.

stages:
  - lint
  - test
  - build
  - quality

default:
  image: node:20-alpine
  cache:
    key: { files: [package-lock.json, pnpm-lock.yaml] }
    paths: [.npm/, node_modules/]
  before_script:
    - apk add --no-cache git

.app_lint: &app_lint
  stage: lint
  script:
    - cd apps/$APP
    - npm install --no-audit --no-fund --silent
    - npm run lint --if-present

lint:booking:   { <<: *app_lint, variables: { APP: booking   } }
lint:admin:     { <<: *app_lint, variables: { APP: admin     } }
lint:agencies:  { <<: *app_lint, variables: { APP: agencies  } }
lint:mobile:    { <<: *app_lint, variables: { APP: mobile    } }

.app_build: &app_build
  stage: build
  script:
    - cd apps/$APP
    - npm install --no-audit --no-fund --silent
    - npm run build --if-present
  artifacts:
    paths: [apps/$APP/dist, apps/$APP/build]
    expire_in: 1 week

build:booking:   { <<: *app_build, variables: { APP: booking   } }
build:admin:     { <<: *app_build, variables: { APP: admin     } }
build:agencies:  { <<: *app_build, variables: { APP: agencies  } }

