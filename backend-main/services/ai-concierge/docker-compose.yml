services:
  pgvector:
    # Use an image with pgvector preinstalled so CREATE EXTENSION vector succeeds
    image: ankane/pgvector:latest
    container_name: umoja-ai-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus_ai
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=20
      - -c
      - max_worker_processes=2
      - -c
      - max_parallel_workers=2
    ports:
      - "5432:5432"
    volumes:
      - ./pg_init.sql:/docker-entrypoint-initdb.d/pg_init.sql:ro
      - pgvector_data:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.75
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_ai"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  pgvector_data:
